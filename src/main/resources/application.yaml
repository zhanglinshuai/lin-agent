spring:
  application:
    name: lin-agent
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: 123456
  ai:
    dashscope:
      api-key: sk-6dc2d723f04249d4b8f203d8e43fdaa3
      chat:
        options:
          model: qwen3-max
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        max-document-batch-size: 10000
server:
  port: 8123
  servlet:
    context-path: /agent

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    group: 'default'
    paths-to-math: '/**'
    packages-to-scan: com.lin.linagent.controller
knife4j:
  enable: true
  setting:
    language: zh_cn
