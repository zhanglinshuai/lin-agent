spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.mcp.client.autoconfigure.StdioTransportAutoConfiguration
      - org.springframework.ai.mcp.client.autoconfigure.SseHttpClientTransportAutoConfiguration
  # elasticsearch 配置
  elasticsearch:
    username: elastic
    password: QmlsSThsJJx_UUVYx9Ro
    uris: http://localhost:9200

  application:
    name: lin-agent
  datasource:
    # mysql配置
    mysql:
      url: jdbc:mysql://localhost:3306/chat_agent
      username: root
      password: 123456
      driver-class-name: com.mysql.cj.jdbc.Driver
    # pgVector配置
    pgvector:
      url: jdbc:postgresql://localhost:5432/postgres?currentSchema=public
      username: postgres
      password: 123456
      driver-class-name: org.postgresql.Driver
  ai:
    # chatmemory不初始化schema
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: never
    # dashscope 配置
    dash-scope:
      api-key: sk-6dc2d723f04249d4b8f203d8e43fdaa3
      chat:
        options:
          model: qwen3-max
    #vector
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        max-document-batch-size: 10000
    #mcp 客户端配置（使用 stdio，读取 mcp-servers.json）
    mcp:
      client:
        enabled: true
        type: SYNC
        stdio:
          enabled: true
          servers-configuration: classpath:/mcp-servers.json
lin:
  search:
    # 搜索提供方按顺序尝试，默认优先 tavily，其次 metaso 兜底
    provider-order: ${LIN_SEARCH_PROVIDER_ORDER:tavily,metaso}
    # 原始搜索词全部 provider 未命中后，再做几轮搜索词改写遍历
    query-rewrite-rounds: ${LIN_SEARCH_QUERY_REWRITE_ROUNDS:2}
    # 每轮最多生成多少条新的搜索词候选
    query-rewrite-candidates-per-round: ${LIN_SEARCH_QUERY_REWRITE_CANDIDATES_PER_ROUND:2}
    # 建议在环境变量中配置 Tavily Key，以获得更好的检索质量
    tavily-api-key: ${TAVILY_API_KEY:}
    # 如未配置则会回退到代码中的默认 metaso key
    metaso-api-key: ${METASO_API_KEY:}
server:
  port: 8080
  servlet:
    context-path: /api
# mybatis-plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    # 仅在开发环境开启日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete #逻辑删除字段
      logic-delete-value: 1 #逻辑已删除值
      logic-not-delete-value: 0 #逻辑未删除值
  # springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.lin.linagent.controller
  # knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
logging:
  level:
    org.springframework.web.servlet.resource: DEBUG
